{% extends "base.html" %}
{% block content %}
<h3>Templates</h3>
<table class="table table-bordered">
  <thead>
    <tr>
      <th>Site</th>
      <th>Subject</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for template in templates %}
    <tr>
      <td>{{ template.site_code }}</td>
      <td>{{ template.subject_template }}</td>
      <td><a class="btn btn-sm btn-primary" href="{{ url_for('edit_template', site_code=template.site_code) }}">Edit</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}

{% extends "base.html" %}
{% block content %}
<h3>Edit Template for {{ template.site_code }}</h3>
<form method="post">
  <div class="mb-3">
    <label class="form-label">Subject</label>
    <input class="form-control" name="subject_template" value="{{ template.subject_template }}" required>
  </div>
  <div class="mb-3">
    <label class="form-label">Body</label>
    <textarea class="form-control" name="body_template" rows="8" required>{{ template.body_template }}</textarea>
  </div>
  <button class="btn btn-primary">Save</button>
  <a class="btn btn-secondary" href="{{ url_for('templates') }}">Cancel</a>
</form>
{% endblock %}
